<div class="form-container">
  <h3>Reactive Form</h3>
  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" novalidate>
    
    <div class="form-group">
      <label for="name">Name:</label>
      <input 
        type="text" 
        id="name" 
        formControlName="name"
        class="form-control"
        [class.invalid]="userForm.get('name')?.invalid && userForm.get('name')?.touched">
      <div *ngIf="getErrorMessage('name')" class="error">
        <small>{{ getErrorMessage('name') }}</small>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email"
        class="form-control"
        [class.invalid]="userForm.get('email')?.invalid && userForm.get('email')?.touched">
      <div *ngIf="getErrorMessage('email')" class="error">
        <small>{{ getErrorMessage('email') }}</small>
      </div>
    </div>

    <div class="form-group">
      <label for="age">Age:</label>
      <input 
        type="number" 
        id="age" 
        formControlName="age"
        class="form-control"
        [class.invalid]="userForm.get('age')?.invalid && userForm.get('age')?.touched">
      <div *ngIf="getErrorMessage('age')" class="error">
        <small>{{ getErrorMessage('age') }}</small>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input 
        type="password" 
        id="password" 
        formControlName="password"
        class="form-control"
        [class.invalid]="userForm.get('password')?.invalid && userForm.get('password')?.touched">
      <div *ngIf="getErrorMessage('password')" class="error">
        <small>{{ getErrorMessage('password') }}</small>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password:</label>
      <input 
        type="password" 
        id="confirmPassword" 
        formControlName="confirmPassword"
        class="form-control"
        [class.invalid]="userForm.get('confirmPassword')?.invalid && userForm.get('confirmPassword')?.touched">
      <div *ngIf="getErrorMessage('confirmPassword')" class="error">
        <small>{{ getErrorMessage('confirmPassword') }}</small>
      </div>
    </div>

    <button type="submit" [disabled]="userForm.invalid" class="submit-btn">
      Submit Reactive Form
    </button>

    <div class="form-status">
      <p><strong>Form Status:</strong> {{ userForm.valid ? 'Valid' : 'Invalid' }}</p>
      <p><strong>Form Touched:</strong> {{ userForm.touched ? 'Yes' : 'No' }}</p>
    </div>
  </form>
</div>
